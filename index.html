<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCRP Dispatch</title>
  <!--
    VERSIONING: Format is V[MAJOR].[MINOR].[PATCH]
    - PATCH (+1): any update
    - MINOR (+1, PATCH resets to 0): major/significant change declared
    - MAJOR: never changes (always 3)
    Current: V3.1.1
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #111; font-size: 13px; color: #aaa; flex-shrink: 0; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; }
    #status-dot.error { background: #ef4444; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* === SIDEBAR === */
    #calls-sidebar {
      width: 280px;
      min-width: 280px;
      background: #111;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar-scroll {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    #sidebar-scroll::-webkit-scrollbar { width: 5px; }
    #sidebar-scroll::-webkit-scrollbar-track { background: #111; }
    #sidebar-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .sidebar-section-header {
      font-size: 11px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 14px 6px;
    }
    .sidebar-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 8px 10px;
    }

    /* Call cards */
    .call-card {
      margin: 4px 10px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .call-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .call-number { font-size: 13px; font-weight: bold; color: #fff; }
    .call-desc { font-size: 12px; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
    .call-units-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .call-units { display: flex; flex-wrap: wrap; gap: 4px; }
    .call-unit-badge { font-size: 11px; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 2px 7px; color: #ddd; }
    .call-no-units { font-size: 11px; color: #555; font-style: italic; }

    /* Unit rows */
    .unit-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 4px;
      margin: 1px 6px;
    }
    .unit-row:hover { background: #1a1a1a; }
    .unit-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.3);
    }
    .unit-callsign {
      font-size: 12px;
      font-weight: bold;
      color: #ddd;
      min-width: 60px;
    }
    .unit-team {
      font-size: 11px;
      color: #666;
      flex: 1;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-empty { font-size: 12px; color: #555; padding: 6px 14px; font-style: italic; }

    /* === MAP === */
    #map-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #map-container:active { cursor: grabbing; }
    #map-wrapper {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    canvas { display: block; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 16px; background: #111; font-size: 12px; color: #aaa; flex-shrink: 0; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; }

    #zoom-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 32px; height: 32px;
      background: #222; border: 1px solid #444; color: #fff;
      font-size: 18px; line-height: 1; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .zoom-btn:hover { background: #333; }
    #zoom-level { font-size: 11px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div id="status-bar">
    <span><span id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span id="last-updated"></span>
  </div>
  <div id="main">

    <!-- SIDEBAR -->
    <div id="calls-sidebar">
      <div id="sidebar-scroll">

        <!-- Active Calls -->
        <div class="sidebar-section-header">Active Calls</div>
        <div id="calls-list"><div class="sidebar-empty">No active calls</div></div>

        <hr class="sidebar-divider">

        <!-- Online Units -->
        <div class="sidebar-section-header">Online Units</div>
        <div id="units-sheriff"></div>
        <div id="units-police"></div>
        <div id="units-fire"></div>
        <div id="units-dot"></div>
        <div id="units-staff"></div>

      </div>
    </div>

    <!-- MAP -->
    <div id="map-container">
      <div id="map-wrapper">
        <canvas id="map-canvas"></canvas>
      </div>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <div id="zoom-level">100%</div>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
    </div>

  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Sheriff</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Police</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Fire</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>DOT</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Staff Team</div>
    <div class="legend-item"><div class="legend-dot" style="background:#000;border-color:#ccc"></div>Call</div>
  </div>

  <script>
    const VERSION = 'V3.1.2';
    const WORKER_URL = 'https://winter-dust-d61c.dogegamer64209.workers.dev/';
    const MAP_URL = 'https://api.policeroleplay.community/maps/fall_blank.png';
    const POLL_INTERVAL = 5000;

    const TEAM_COLORS = {
      Sheriff: '#22c55e',
      Police: '#3b82f6',
      Fire: '#ef4444',
      DOT: '#f59e0b'
    };

    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const lastUpdated = document.getElementById('last-updated');
    const mapContainer = document.getElementById('map-container');
    const mapWrapper = document.getElementById('map-wrapper');
    const zoomLevelEl = document.getElementById('zoom-level');

    let mapImage = null;
    let latestData = null;

    // === ZOOM & PAN ===
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let isPanning = false;
    let panStartX = 0, panStartY = 0, panStartOffsetX = 0, panStartOffsetY = 0;
    const MIN_SCALE = 0.3;   // 30% minimum zoom
    const MAX_SCALE = 5;
    const ZOOM_STEP = 0.2;

    function applyTransform() {
      mapWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      zoomLevelEl.textContent = Math.round(scale * 100) + '%';
    }

    function clampOffset() {
      if (!mapImage) return;
      const cw = mapContainer.clientWidth;
      const ch = mapContainer.clientHeight;
      const mw = mapImage.naturalWidth * scale;
      const mh = mapImage.naturalHeight * scale;
      offsetX = Math.max(Math.min(0, cw - mw), Math.min(0, offsetX));
      offsetY = Math.max(Math.min(0, ch - mh), Math.min(0, offsetY));
    }

    function zoomBy(delta, cx, cy) {
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
      if (newScale === scale) return;
      const pivotX = cx !== undefined ? cx : mapContainer.clientWidth / 2;
      const pivotY = cy !== undefined ? cy : mapContainer.clientHeight / 2;
      offsetX = pivotX - (pivotX - offsetX) * (newScale / scale);
      offsetY = pivotY - (pivotY - offsetY) * (newScale / scale);
      scale = newScale;
      clampOffset();
      applyTransform();
      // Redraw map so icon sizes update with new scale
      drawMap(latestData);
    }

    document.getElementById('zoom-in').addEventListener('click', () => zoomBy(ZOOM_STEP));
    document.getElementById('zoom-out').addEventListener('click', () => zoomBy(-ZOOM_STEP));

    mapContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = mapContainer.getBoundingClientRect();
      zoomBy(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP, e.clientX - rect.left, e.clientY - rect.top);
    }, { passive: false });

    mapContainer.addEventListener('mousedown', (e) => {
      isPanning = true;
      panStartX = e.clientX; panStartY = e.clientY;
      panStartOffsetX = offsetX; panStartOffsetY = offsetY;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      offsetX = panStartOffsetX + (e.clientX - panStartX);
      offsetY = panStartOffsetY + (e.clientY - panStartY);
      clampOffset();
      applyTransform();
    });
    window.addEventListener('mouseup', () => { isPanning = false; });

    let lastTouchDist = null;
    mapContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = true;
        panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
        panStartOffsetX = offsetX; panStartOffsetY = offsetY;
      }
    });
    mapContainer.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2) {
        isPanning = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (lastTouchDist !== null) {
          const rect = mapContainer.getBoundingClientRect();
          const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
          const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
          zoomBy((dist - lastTouchDist) * 0.01, cx, cy);
        }
        lastTouchDist = dist;
      } else if (e.touches.length === 1 && isPanning) {
        offsetX = panStartOffsetX + (e.touches[0].clientX - panStartX);
        offsetY = panStartOffsetY + (e.touches[0].clientY - panStartY);
        clampOffset();
        applyTransform();
      }
    }, { passive: false });
    mapContainer.addEventListener('touchend', () => { isPanning = false; lastTouchDist = null; });

    // === MAP DRAWING ===
    function loadMap() {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { mapImage = img; resolve(); };
        img.onerror = reject;
        img.src = MAP_URL;
      });
    }

    function drawMap(data) {
      if (!mapImage) return;
      canvas.width = mapImage.naturalWidth;
      canvas.height = mapImage.naturalHeight;
      ctx.drawImage(mapImage, 0, 0);

      // Icon sizes scale inversely with zoom — bigger zoom = smaller canvas-space icons
      // Base sizes are at scale=1; divide by scale so screen size stays roughly constant
      const BASE_RADIUS = 20;
      const BASE_BORDER = 5;
      const BASE_FONT = 54;
      const BASE_CALL_FONT = 36;

      // NEW — icons stay at base size when zoomed out, grow slightly when zoomed in
      const iconScale = Math.max(1, scale);
      const radius = BASE_RADIUS / iconScale;
      const border = BASE_BORDER / iconScale;
      const fontSize = BASE_FONT / iconScale;
      const callFontSize = BASE_CALL_FONT / iconScale;

      function drawDot(x, z, fillColor, borderColor) {
        ctx.beginPath();
        ctx.arc(x, z, radius + border, 0, Math.PI * 2);
        ctx.fillStyle = borderColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, z, radius, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
      }

      function drawText(text, x, y, size, above) {
        ctx.font = `bold ${size}px Arial, sans-serif`;
        ctx.lineWidth = size * 0.08;
        ctx.strokeStyle = 'black';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = above ? 'bottom' : 'top';
        ctx.strokeText(text, x, y);
        ctx.fillText(text, x, y);
      }

      const players = (data && data.Players) || [];
      const calls = (data && data.EmergencyCalls) || [];

      for (const call of calls) {
        const pos = call.Position || [];
        if (pos.length < 2) continue;
        const [x, z] = pos;
        drawDot(x, z, 'black', 'white');
        drawText(`#${call.CallNumber}`, x, z - radius - border - 8 / iconScale, callFontSize, true);
        const caller = call.Caller;
        let belowText = call.Description || '';
        if (caller) {
          const match = players.find(p => String(p.Player || '').split(':')[1] === String(caller));
          belowText = match ? match.Player.split(':')[0] : String(caller);
        }
        drawText(belowText, x, z + radius + border + 8 / iconScale, callFontSize, false);
      }

      for (const player of players) {
        const loc = player.Location || {};
        const x = loc.LocationX;
        const z = loc.LocationZ;
        const team = player.Team || '';
        const callsign = player.Callsign || 'Unknown';
        if (x == null || z == null) continue;
        if (!TEAM_COLORS[team]) continue;
        const color = callsign.includes('ST') ? '#e67e22' : TEAM_COLORS[team];
        drawDot(x, z, color, 'white');
        drawText(callsign, x, z + radius + border + 8 / iconScale, fontSize, false);
      }
    }

    // === SIDEBAR ===
    function updateSidebar(data) {
      const calls = (data && data.EmergencyCalls) || [];
      const players = (data && data.Players) || [];

      // UID -> callsign map
      const uidMap = {};
      for (const player of players) {
        const raw = player.Player || '';
        const parts = raw.split(':');
        if (parts.length >= 2) {
          uidMap[parts[1].trim()] = player.Callsign || parts[0].trim();
        }
      }

      // --- Calls ---
      const callsList = document.getElementById('calls-list');
      callsList.innerHTML = '';
      if (calls.length === 0) {
        callsList.innerHTML = '<div class="sidebar-empty">No active calls</div>';
      } else {
        for (const call of calls) {
          const card = document.createElement('div');
          card.className = 'call-card';
          const attachedUIDs = call.Players || [];
          const badgeHTML = attachedUIDs.length === 0
            ? '<span class="call-no-units">None attached</span>'
            : attachedUIDs.map(uid => `<span class="call-unit-badge">${uidMap[String(uid)] || 'UID:' + uid}</span>`).join('');
          card.innerHTML = `
            <div class="call-card-header"><span class="call-number">Call #${call.CallNumber}</span></div>
            <div class="call-desc">${call.Description || 'No description'}</div>
            <div class="call-units-label">Attached Units</div>
            <div class="call-units">${badgeHTML}</div>
          `;
          callsList.appendChild(card);
        }
      }

      // --- Online Units grouped by team ---
      const groups = {
        Sheriff: { id: 'units-sheriff', label: 'Sheriff', color: '#22c55e', units: [] },
        Police:  { id: 'units-police',  label: 'Police',  color: '#3b82f6', units: [] },
        Fire:    { id: 'units-fire',    label: 'Fire',    color: '#ef4444', units: [] },
        DOT:     { id: 'units-dot',     label: 'DOT',     color: '#f59e0b', units: [] },
        Staff:   { id: 'units-staff',   label: 'Staff',   color: '#e67e22', units: [] },
      };

      for (const player of players) {
        const team = player.Team || '';
        const callsign = player.Callsign || (player.Player || '').split(':')[0] || 'Unknown';
        const isStaff = callsign.includes('ST');
        if (isStaff) {
          groups.Staff.units.push({ callsign, team });
        } else if (groups[team]) {
          groups[team].units.push({ callsign, team });
        }
      }

      for (const key of ['Sheriff', 'Police', 'Fire', 'DOT', 'Staff']) {
        const g = groups[key];
        const el = document.getElementById(g.id);
        el.innerHTML = '';
        if (g.units.length === 0) continue;

        const label = document.createElement('div');
        label.className = 'sidebar-section-header';
        label.style.paddingTop = '4px';
        label.textContent = `${g.label} (${g.units.length})`;
        el.appendChild(label);

        for (const u of g.units) {
          const row = document.createElement('div');
          row.className = 'unit-row';
          row.innerHTML = `
            <div class="unit-dot" style="background:${g.color}"></div>
            <span class="unit-callsign">${u.callsign}</span>
          `;
          el.appendChild(row);
        }
      }
    }

    // === FETCH ===
    async function fetchData() {
      try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();
        latestData = data;
        drawMap(data);
        updateSidebar(data);
        statusDot.className = '';
        statusText.textContent = `${data.Name || 'Server'} — ${data.CurrentPlayers || 0}/${data.MaxPlayers || 0} players - ${VERSION}`;
        lastUpdated.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        statusDot.className = 'error';
        statusText.textContent = 'Connection error';
        if (mapImage) drawMap(latestData);
      }
    }

    async function init() {
      try { await loadMap(); } catch(e) {}
      drawMap(null);
      await fetchData();
      setInterval(fetchData, POLL_INTERVAL);
    }

    init();
  </script>
</body>
</html>
