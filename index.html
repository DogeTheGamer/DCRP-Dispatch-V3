<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCRP Dispatch</title>
  <!--
    VERSIONING: Format is V[MAJOR].[MINOR].[PATCH]
    - PATCH (+1): any update
    - MINOR (+1, PATCH resets to 0): major/significant change declared
    - MAJOR: never changes (always 3)
    Current: V3.1.0
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #111; font-size: 13px; color: #aaa; flex-shrink: 0; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; }
    #status-dot.error { background: #ef4444; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* === CALLS SIDEBAR === */
    #calls-sidebar {
      width: 280px;
      min-width: 280px;
      background: #111;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #calls-sidebar h2 {
      font-size: 13px;
      font-weight: bold;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 14px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #calls-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    #calls-list::-webkit-scrollbar { width: 5px; }
    #calls-list::-webkit-scrollbar-track { background: #111; }
    #calls-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .call-card {
      margin: 6px 10px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .call-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .call-number {
      font-size: 13px;
      font-weight: bold;
      color: #fff;
    }
    .call-desc {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .call-units-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .call-units {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .call-unit-badge {
      font-size: 11px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 7px;
      color: #ddd;
    }
    .call-no-units {
      font-size: 11px;
      color: #555;
      font-style: italic;
    }
    #calls-empty {
      font-size: 13px;
      color: #555;
      text-align: center;
      margin-top: 40px;
      padding: 0 20px;
    }

    /* === MAP SIDE === */
    #map-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #map-container:active { cursor: grabbing; }
    #map-wrapper {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    canvas { display: block; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 16px; background: #111; font-size: 12px; color: #aaa; flex-shrink: 0; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; }

    #zoom-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 32px;
      height: 32px;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .zoom-btn:hover { background: #333; }
    #zoom-level {
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <span><span id="status-dot"></span><span id="status-text">Connecting...</span></span>
    <span id="last-updated"></span>
  </div>
  <div id="main">

    <!-- CALLS SIDEBAR -->
    <div id="calls-sidebar">
      <h2>Active Calls</h2>
      <div id="calls-list">
        <div id="calls-empty">No active calls</div>
      </div>
    </div>

    <!-- MAP -->
    <div id="map-container">
      <div id="map-wrapper">
        <canvas id="map-canvas"></canvas>
      </div>
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <div id="zoom-level">100%</div>
        <button class="zoom-btn" id="zoom-out">−</button>
      </div>
    </div>

  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Sheriff</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Police</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Fire</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>DOT</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Staff Team</div>
    <div class="legend-item"><div class="legend-dot" style="background:#000;border-color:#ccc"></div>Call</div>
  </div>

  <script>
    const VERSION = 'V3.1.0';
    const WORKER_URL = 'https://winter-dust-d61c.dogegamer64209.workers.dev/';
    const MAP_URL = 'https://api.policeroleplay.community/maps/fall_blank.png';
    const POLL_INTERVAL = 5000;

    const TEAM_COLORS = {
      Sheriff: '#22c55e',
      Police: '#3b82f6',
      Fire: '#ef4444',
      DOT: '#f59e0b'
    };

    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const lastUpdated = document.getElementById('last-updated');
    const callsList = document.getElementById('calls-list');
    const callsEmpty = document.getElementById('calls-empty');
    const mapContainer = document.getElementById('map-container');
    const mapWrapper = document.getElementById('map-wrapper');
    const zoomLevel = document.getElementById('zoom-level');

    let mapImage = null;
    let latestData = null;

    // === ZOOM & PAN STATE ===
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartOffsetX = 0;
    let panStartOffsetY = 0;
    const MIN_SCALE = 0.2;
    const MAX_SCALE = 5;
    const ZOOM_STEP = 0.2;

    function applyTransform() {
      mapWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      zoomLevel.textContent = Math.round(scale * 100) + '%';
    }

    function clampOffset() {
      if (!mapImage) return;
      const cw = mapContainer.clientWidth;
      const ch = mapContainer.clientHeight;
      const mw = mapImage.naturalWidth * scale;
      const mh = mapImage.naturalHeight * scale;
      const minX = Math.min(0, cw - mw);
      const minY = Math.min(0, ch - mh);
      offsetX = Math.max(minX, Math.min(0, offsetX));
      offsetY = Math.max(minY, Math.min(0, offsetY));
    }

    function zoomBy(delta, cx, cy) {
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale + delta));
      if (newScale === scale) return;
      const pivotX = (cx !== undefined ? cx : mapContainer.clientWidth / 2);
      const pivotY = (cy !== undefined ? cy : mapContainer.clientHeight / 2);
      offsetX = pivotX - (pivotX - offsetX) * (newScale / scale);
      offsetY = pivotY - (pivotY - offsetY) * (newScale / scale);
      scale = newScale;
      clampOffset();
      applyTransform();
    }

    document.getElementById('zoom-in').addEventListener('click', () => zoomBy(ZOOM_STEP));
    document.getElementById('zoom-out').addEventListener('click', () => zoomBy(-ZOOM_STEP));

    mapContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = mapContainer.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      zoomBy(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP, cx, cy);
    }, { passive: false });

    mapContainer.addEventListener('mousedown', (e) => {
      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panStartOffsetX = offsetX;
      panStartOffsetY = offsetY;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      offsetX = panStartOffsetX + (e.clientX - panStartX);
      offsetY = panStartOffsetY + (e.clientY - panStartY);
      clampOffset();
      applyTransform();
    });
    window.addEventListener('mouseup', () => { isPanning = false; });

    // Touch support
    let lastTouchDist = null;
    mapContainer.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = true;
        panStartX = e.touches[0].clientX;
        panStartY = e.touches[0].clientY;
        panStartOffsetX = offsetX;
        panStartOffsetY = offsetY;
      }
    });
    mapContainer.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2) {
        isPanning = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (lastTouchDist !== null) {
          const rect = mapContainer.getBoundingClientRect();
          const cx = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
          const cy = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
          zoomBy((dist - lastTouchDist) * 0.01, cx, cy);
        }
        lastTouchDist = dist;
      } else if (e.touches.length === 1 && isPanning) {
        offsetX = panStartOffsetX + (e.touches[0].clientX - panStartX);
        offsetY = panStartOffsetY + (e.touches[0].clientY - panStartY);
        clampOffset();
        applyTransform();
      }
    }, { passive: false });
    mapContainer.addEventListener('touchend', () => { isPanning = false; lastTouchDist = null; });

    // === MAP DRAWING ===
    function loadMap() {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { mapImage = img; resolve(); };
        img.onerror = reject;
        img.src = MAP_URL;
      });
    }

    function drawMap(data) {
      if (!mapImage) return;
      canvas.width = mapImage.naturalWidth;
      canvas.height = mapImage.naturalHeight;
      ctx.drawImage(mapImage, 0, 0);

      const fontSize = 54;
      const callFontSize = 36;
      const radius = 20;
      const border = 5;

      function drawDot(x, z, fillColor, borderColor) {
        ctx.beginPath();
        ctx.arc(x, z, radius + border, 0, Math.PI * 2);
        ctx.fillStyle = borderColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, z, radius, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
      }

      function drawText(text, x, y, size, above) {
        ctx.font = `bold ${size}px Arial, sans-serif`;
        ctx.lineWidth = size * 0.08;
        ctx.strokeStyle = 'black';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = above ? 'bottom' : 'top';
        ctx.strokeText(text, x, y);
        ctx.fillText(text, x, y);
      }

      const players = (data && data.Players) || [];
      const calls = (data && data.EmergencyCalls) || [];

      for (const call of calls) {
        const pos = call.Position || [];
        if (pos.length < 2) continue;
        const [x, z] = pos;
        drawDot(x, z, 'black', 'white');
        drawText(`#${call.CallNumber}`, x, z - radius - border - 8, callFontSize, true);
        const caller = call.Caller;
        let belowText = call.Description || '';
        if (caller) {
          const match = players.find(p => String(p.Player || '').split(':')[1] === String(caller));
          belowText = match ? match.Player.split(':')[0] : String(caller);
        }
        drawText(belowText, x, z + radius + border + 8, callFontSize, false);
      }

      for (const player of players) {
        const loc = player.Location || {};
        const x = loc.LocationX;
        const z = loc.LocationZ;
        const team = player.Team || '';
        const callsign = player.Callsign || 'Unknown';
        if (x == null || z == null) continue;
        if (!TEAM_COLORS[team]) continue;
        const color = callsign.includes('ST') ? '#e67e22' : TEAM_COLORS[team];
        drawDot(x, z, color, 'white');
        drawText(callsign, x, z + radius + border + 8, fontSize, false);
      }
    }

    // === CALLS SIDEBAR ===
    function updateCallsSidebar(data) {
      const calls = (data && data.EmergencyCalls) || [];
      const players = (data && data.Players) || [];

      // Build UID -> callsign lookup
      const uidMap = {};
      for (const player of players) {
        const raw = player.Player || '';
        const parts = raw.split(':');
        if (parts.length >= 2) {
          const uid = parts[1].trim();
          const name = parts[0].trim();
          uidMap[uid] = player.Callsign || name;
        }
      }

      callsList.innerHTML = '';

      if (calls.length === 0) {
        callsList.appendChild(callsEmpty);
        callsEmpty.style.display = '';
        return;
      }

      for (const call of calls) {
        const card = document.createElement('div');
        card.className = 'call-card';

        const header = document.createElement('div');
        header.className = 'call-card-header';

        const num = document.createElement('span');
        num.className = 'call-number';
        num.textContent = `Call #${call.CallNumber}`;
        header.appendChild(num);
        card.appendChild(header);

        const desc = document.createElement('div');
        desc.className = 'call-desc';
        desc.textContent = call.Description || 'No description';
        card.appendChild(desc);

        const unitsLabel = document.createElement('div');
        unitsLabel.className = 'call-units-label';
        unitsLabel.textContent = 'Attached Units';
        card.appendChild(unitsLabel);

        const attachedUIDs = call.Players || [];
        const unitsDiv = document.createElement('div');
        unitsDiv.className = 'call-units';

        if (attachedUIDs.length === 0) {
          const none = document.createElement('span');
          none.className = 'call-no-units';
          none.textContent = 'None attached';
          unitsDiv.appendChild(none);
        } else {
          for (const uid of attachedUIDs) {
            const badge = document.createElement('span');
            badge.className = 'call-unit-badge';
            badge.textContent = uidMap[String(uid)] || `UID:${uid}`;
            unitsDiv.appendChild(badge);
          }
        }

        card.appendChild(unitsDiv);
        callsList.appendChild(card);
      }
    }

    // === DATA FETCH ===
    async function fetchData() {
      try {
        const res = await fetch(WORKER_URL);
        const data = await res.json();
        latestData = data;
        drawMap(data);
        updateCallsSidebar(data);
        statusDot.className = '';
        statusText.textContent = `${data.Name || 'Server'} — ${data.CurrentPlayers || 0}/${data.MaxPlayers || 0} players - ${VERSION}`;
        lastUpdated.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        statusDot.className = 'error';
        statusText.textContent = 'Connection error';
        if (mapImage) drawMap(latestData);
      }
    }

    async function init() {
      try { await loadMap(); } catch(e) {}
      drawMap(null);
      await fetchData();
      setInterval(fetchData, POLL_INTERVAL);
    }

    init();
  </script>
</body>
</html>
